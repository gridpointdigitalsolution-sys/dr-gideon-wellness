<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#0a3d1f" />
  <title>Offline — Dr. Gideon Afolabi Wellness</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Georgia, 'Times New Roman', serif;
      background: linear-gradient(160deg, #071c0f 0%, #0a3d1f 60%, #0d4a24 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,215,0,0.2);
      border-radius: 24px;
      padding: 48px 36px;
      text-align: center;
      max-width: 420px;
      width: 100%;
      box-shadow: 0 24px 64px rgba(0,0,0,0.4);
    }
    .icon {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, rgba(255,215,0,0.12), rgba(34,160,80,0.08));
      border: 1px solid rgba(255,215,0,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 36px;
    }
    h1 {
      color: #ffd700;
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 12px;
      letter-spacing: 0.3px;
    }
    p {
      color: rgba(187,244,210,0.7);
      font-size: 14px;
      line-height: 1.7;
      margin-bottom: 8px;
    }
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,215,0,0.25), transparent);
      margin: 24px 0;
    }
    .tip {
      font-size: 13px;
      color: rgba(187,244,210,0.5);
      font-style: italic;
    }
    button {
      margin-top: 28px;
      padding: 12px 28px;
      background: linear-gradient(135deg, #ffd700, #e6c300);
      color: #0a3d1f;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      font-family: inherit;
      box-shadow: 0 4px 16px rgba(255,215,0,0.35);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    button:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(255,215,0,0.45); }
    button:active { transform: translateY(0); }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🌿</div>
    <h1>You Are Offline</h1>
    <p>It looks like your internet connection is not available right now.</p>
    <p>Please check your connection and try again.</p>
    <div class="divider"></div>
    <p class="tip">"Nature heals, but patience is also part of the remedy."</p>
    <p class="tip" style="margin-top:8px">— Dr. Gideon Afolabi</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
